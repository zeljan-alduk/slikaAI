name: Private AI Photo Repair

# CI builds the private-ai-photo-repair Vite app on every push/PR that touches
# it. Deployment to GitHub Pages runs only from the default branch (main),
# because the github-pages environment only permits deployments from the
# default branch. Manual runs are also supported via workflow_dispatch.
on:
  push:
    branches:
      - main
    paths:
      - "private-ai-photo-repair/**"
      - ".github/workflows/private-ai-photo-repair.yml"
  pull_request:
    paths:
      - "private-ai-photo-repair/**"
      - ".github/workflows/private-ai-photo-repair.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: private-ai-photo-repair

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: private-ai-photo-repair/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build

      # Only prepare the Pages artifact when we intend to deploy (main branch).
      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: private-ai-photo-repair/dist

  deploy:
    # Deploy only from the default branch; PRs and other branches are CI-only.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
